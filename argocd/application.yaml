apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-boutique
  namespace: argocd
  # Finalizer ensures ArgoCD removes all resources when this Application is deleted
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # WHERE to get the desired state from (your Git repo)
  source:
    repoURL: https://github.com/vanessa9373/portfolio-devops-project.git
    targetRevision: HEAD
    path: kubernetes-manifests

  # WHERE to deploy (in-cluster, online-boutique namespace)
  destination:
    server: https://kubernetes.default.svc
    namespace: online-boutique

  # HOW to sync
  syncPolicy:
    automated:
      prune: true       # delete resources that were removed from Git
      selfHeal: true    # revert manual changes to the cluster
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Health checks — ArgoCD monitors these
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas  # ignore replica count differences (managed by HPA)
