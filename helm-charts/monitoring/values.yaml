# kube-prometheus-stack Helm chart values
# Deploy with:
#   helm install monitoring prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace -f helm-charts/monitoring/values.yaml

grafana:
  enabled: true
  adminPassword: "DevOpsPortfolio2024!"

  # Expose Grafana via LoadBalancer so you can access it from browser
  service:
    type: ClusterIP   # use port-forward for demo; set LoadBalancer for public access

  persistence:
    enabled: true
    size: 5Gi

  # Pre-load dashboards
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      kubernetes-pods:
        gnetId: 6781
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 27
        datasource: Prometheus

prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "10GB"

    # Scrape all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'null'
      routes:
        - match:
            severity: critical
          receiver: critical-alerts
    receivers:
      - name: 'null'
      - name: 'critical-alerts'
        # Add Slack/PagerDuty webhook here when ready:
        # slack_configs:
        #   - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        #     channel: '#alerts'
        #     title: 'Alert: {{ .GroupLabels.alertname }}'
        #     text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
