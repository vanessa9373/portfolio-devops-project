# ─────────────────────────────────────────────────────────────────────────────
# RBAC — Role-Based Access Control for Online Boutique
# Principle: each service account gets only what it needs
# ─────────────────────────────────────────────────────────────────────────────

# Read-only role for application pods
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-read-only
  namespace: online-boutique
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
# Service accounts — one per service (least privilege)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: online-boutique
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: checkout-sa
  namespace: online-boutique
---
# Bind the read-only role to both service accounts
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-read-only-binding
  namespace: online-boutique
subjects:
  - kind: ServiceAccount
    name: frontend-sa
    namespace: online-boutique
  - kind: ServiceAccount
    name: checkout-sa
    namespace: online-boutique
roleRef:
  kind: Role
  name: app-read-only
  apiGroup: rbac.authorization.k8s.io
---
# DevOps team ClusterRole — can view all resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devops-viewer
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
# Cluster Admin Group binding (restrict who can be cluster-admin)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devops-team-viewer
subjects:
  - kind: Group
    name: devops-engineers
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: devops-viewer
  apiGroup: rbac.authorization.k8s.io
