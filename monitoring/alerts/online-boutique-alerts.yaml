apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: online-boutique-alerts
  namespace: monitoring
  labels:
    # This label makes kube-prometheus-stack pick up the rule
    release: monitoring
spec:
  groups:
    # ── APPLICATION HEALTH ────────────────────────────────────────────────────
    - name: online-boutique.application
      rules:
        - alert: FrontendHighErrorRate
          expr: |
            rate(http_requests_total{job="frontend", status=~"5.."}[5m])
            /
            rate(http_requests_total{job="frontend"}[5m]) > 0.01
          for: 5m
          labels:
            severity: critical
            team: devops
          annotations:
            summary: "Frontend error rate is above 1%"
            description: "Error rate is {{ $value | humanizePercentage }} — users are experiencing failures."
            runbook: "https://github.com/vanessa9373/portfolio-devops-project/blob/main/documentation/runbooks/incident-response.md"

        - alert: ServiceHighLatency
          expr: |
            histogram_quantile(0.99,
              rate(grpc_server_handling_seconds_bucket[5m])
            ) > 1.0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "gRPC service p99 latency above 1s"
            description: "{{ $labels.grpc_service }} p99 latency is {{ $value | humanizeDuration }}"

    # ── KUBERNETES INFRASTRUCTURE ─────────────────────────────────────────────
    - name: online-boutique.kubernetes
      rules:
        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{
              namespace="online-boutique"
            }[15m]) * 60 > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash looping"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} container {{ $labels.container }} is restarting frequently."

        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{
              namespace="online-boutique",
              condition="true"
            } == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is not ready"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been not ready for 5 minutes."

        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas{namespace="online-boutique"}
            !=
            kube_deployment_status_available_replicas{namespace="online-boutique"}
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.deployment }} replicas mismatch"
            description: "Desired {{ $value }} replicas but available count differs."

    # ── RESOURCE USAGE ────────────────────────────────────────────────────────
    - name: online-boutique.resources
      rules:
        - alert: ContainerHighMemoryUsage
          expr: |
            (
              container_memory_usage_bytes{namespace="online-boutique", container!=""}
              /
              container_spec_memory_limit_bytes{namespace="online-boutique", container!=""}
            ) > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Container {{ $labels.container }} memory at {{ $value | humanizePercentage }}"
            description: "Container is approaching OOMKill threshold."

        - alert: NodeDiskPressure
          expr: kube_node_status_condition{condition="DiskPressure", status="true"} == 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} has disk pressure"
            description: "Node is running low on disk space — pods may be evicted."

        - alert: HighCPUThrottling
          expr: |
            rate(container_cpu_cfs_throttled_seconds_total{
              namespace="online-boutique"
            }[5m]) > 0.8
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "CPU throttling on {{ $labels.container }}"
            description: "Container CPU is being throttled — consider increasing limits."
