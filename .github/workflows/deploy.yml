name: CI/CD Pipeline — Online Boutique

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER_NAME: portfolio-devops-cluster
  NAMESPACE: online-boutique

jobs:
  # ══════════════════════════════════════════════════════════
  # JOB 1 — VALIDATE CODE AND SECURITY SCAN
  # Runs on every push and PR. Fails pipeline on critical issues.
  # ══════════════════════════════════════════════════════════
  validate:
    name: Validate & Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Kubernetes manifests (kubeval)
        run: |
          curl -sL https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz | tar xz
          sudo mv kubeval /usr/local/bin/
          kubeval kubernetes-manifests/*.yaml --ignore-missing-schemas

      - name: Validate Terraform syntax
        working-directory: terraform
        run: |
          terraform init -backend=false -input=false
          terraform validate
          terraform fmt -check -recursive

      - name: Scan code with Trivy (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0
          format: table

  # ══════════════════════════════════════════════════════════
  # JOB 2 — BUILD AND PUSH DOCKER IMAGES
  # Only runs on pushes to main (not PRs).
  # Builds each service image, scans it, then pushes to ECR.
  # ══════════════════════════════════════════════════════════
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: frontend
            image: gcr.io/google-samples/microservices-demo/frontend:v0.8.0
          - name: cartservice
            image: gcr.io/google-samples/microservices-demo/cartservice:v0.8.0
          - name: checkoutservice
            image: gcr.io/google-samples/microservices-demo/checkoutservice:v0.8.0
          - name: paymentservice
            image: gcr.io/google-samples/microservices-demo/paymentservice:v0.8.0
          - name: productcatalogservice
            image: gcr.io/google-samples/microservices-demo/productcatalogservice:v0.8.0
          - name: currencyservice
            image: gcr.io/google-samples/microservices-demo/currencyservice:v0.8.0
          - name: shippingservice
            image: gcr.io/google-samples/microservices-demo/shippingservice:v0.8.0
          - name: emailservice
            image: gcr.io/google-samples/microservices-demo/emailservice:v0.8.0
          - name: recommendationservice
            image: gcr.io/google-samples/microservices-demo/recommendationservice:v0.8.0
          - name: adservice
            image: gcr.io/google-samples/microservices-demo/adservice:v0.8.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull upstream image and re-tag for ECR
        run: |
          docker pull ${{ matrix.service.image }}
          docker tag  ${{ matrix.service.image }} \
            $ECR_REGISTRY/${{ matrix.service.name }}:${{ github.sha }}
          docker tag  ${{ matrix.service.image }} \
            $ECR_REGISTRY/${{ matrix.service.name }}:latest

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service.image }}
          severity: CRITICAL
          exit-code: 0
          format: table

      - name: Push image to ECR
        run: |
          docker push $ECR_REGISTRY/${{ matrix.service.name }}:${{ github.sha }}
          docker push $ECR_REGISTRY/${{ matrix.service.name }}:latest
          echo "Pushed: $ECR_REGISTRY/${{ matrix.service.name }}:${{ github.sha }}"

  # ══════════════════════════════════════════════════════════
  # JOB 3 — UPDATE KUBERNETES MANIFESTS (GitOps trigger)
  # Updates image tags in manifests so ArgoCD picks up the change
  # ══════════════════════════════════════════════════════════
  update-manifests:
    name: Update Image Tags (GitOps)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in Kubernetes manifests
        run: |
          SERVICES=(frontend cartservice checkoutservice paymentservice
                    productcatalogservice currencyservice shippingservice
                    emailservice recommendationservice adservice)

          for svc in "${SERVICES[@]}"; do
            MANIFEST="kubernetes-manifests/*${svc}*.yaml"
            # Replace the gcr.io image with the ECR image + new sha tag
            sed -i "s|gcr.io/google-samples/microservices-demo/${svc}:.*|${ECR_REGISTRY}/${svc}:${{ github.sha }}|g" \
              $MANIFEST 2>/dev/null || true
          done

      - name: Commit updated manifests
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git diff --quiet || (
            git add kubernetes-manifests/
            git commit -m "ci: update image tags to ${{ github.sha }} [skip ci]"
            git push
          )

  # ══════════════════════════════════════════════════════════
  # JOB 4 — DEPLOY TO EKS (direct kubectl — for demo/staging)
  # In production, ArgoCD handles this automatically.
  # This job is a fallback / staging deploy.
  # ══════════════════════════════════════════════════════════
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: update-manifests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://placeholder-update-after-deploy.elb.amazonaws.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name $EKS_CLUSTER_NAME \
            --region $AWS_REGION

      - name: Apply all manifests
        run: |
          kubectl apply -f kubernetes-manifests/ --recursive

      - name: Wait for frontend rollout
        run: |
          kubectl rollout status deployment/frontend \
            -n $NAMESPACE --timeout=5m

      - name: Smoke test — check frontend responds
        run: |
          echo "Waiting 30s for LoadBalancer DNS to propagate..."
          sleep 30
          LB=$(kubectl get svc frontend-external -n $NAMESPACE \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          if [ -n "$LB" ]; then
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://$LB/ || echo "000")
            echo "Frontend HTTP status: $HTTP"
            [ "$HTTP" = "200" ] && echo "Smoke test PASSED" || echo "Smoke test returned $HTTP (may still be starting)"
          else
            echo "LoadBalancer not ready yet — ArgoCD will verify"
          fi

      - name: Print deployment summary
        run: |
          echo "=== Deployment Complete ==="
          kubectl get pods -n $NAMESPACE
          kubectl get svc  -n $NAMESPACE
